<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ben Malin — senior frontend engineer in Vienna, VA. Portfolio, resume, and writing." />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <title>Ben Malin — Senior Frontend Engineer</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var mode = stored && stored !== 'system' ? stored : (prefersDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', mode);
        } catch (e) {}
        try {
          var params = new URLSearchParams(window.location.search);
          var p = params.get('p');
          if (p) {
            params.delete('p');
            var qs = params.toString();
            window.history.replaceState(null, '', p + (qs ? (p.indexOf('?') > -1 ? '&' : '?') + qs : ''));
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
